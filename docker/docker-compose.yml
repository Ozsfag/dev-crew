services:

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: dev-crew:latest
    container_name: dev-crew-app
    ports:
      - "8081:8081"
    volumes:
      # Локальная машина: монтируем папку с проектами.
      # На сервере переопределяется в docker-compose.prod.yml
      - ${PROJECTS_ROOT:?Set PROJECTS_ROOT in .env}:/projects
      # Credentials claude login — монтируем с хоста (уже аутентифицированы)
      # ~/.claude.json — главный конфиг с токеном сессии
      # ~/.claude/     — кеш, плагины, история сессий
      # На удалённом сервере: заменить на named volume + claude login вручную
      - ${CLAUDE_AUTH_DIR}:/root/.claude
      - ${CLAUDE_AUTH_JSON}:/root/.claude.json
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/devcrew
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-devcrew}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-devcrew}
      DEVCREW_AUTH_JWT_SECRET: ${DEVCREW_AUTH_JWT_SECRET:?Set DEVCREW_AUTH_JWT_SECRET in .env}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      DEVCREW_NOTIFICATION_TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      DEVCREW_NOTIFICATION_TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DEVCREW_NOTIFICATION_TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: dev-crew-postgres
    environment:
      POSTGRES_DB: devcrew
      POSTGRES_USER: ${DB_USERNAME:-devcrew}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devcrew}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Открываем для локального доступа через IntelliJ / DataGrip
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-devcrew} -d devcrew" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
