server:
  port: 8081

spring:
  application:
    name: dev-crew
  datasource:
    # Локально: jdbc:postgresql://localhost:5432/devcrew
    # В Docker: jdbc:postgresql://postgres:5432/devcrew (задаётся через env SPRING_DATASOURCE_URL)
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/devcrew}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:devcrew}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:devcrew}}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration

langchain4j:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model-name: claude-sonnet-4-6
    max-tokens: 8096
    log-requests: false
    log-responses: false

devcrew:
  agent:
    model: claude-sonnet-4-6
    max-tokens: 8096
    max-iterations: 20
  notification:
    telegram:
      enabled: ${DEVCREW_NOTIFICATION_TELEGRAM_ENABLED:false}
      bot-token: ${DEVCREW_NOTIFICATION_TELEGRAM_BOT_TOKEN:${TELEGRAM_BOT_TOKEN:}}
      chat-id: ${DEVCREW_NOTIFICATION_TELEGRAM_CHAT_ID:${TELEGRAM_CHAT_ID:}}
