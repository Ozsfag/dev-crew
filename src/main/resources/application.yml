server:
  port: 8081

spring:
  application:
    name: dev-crew
  datasource:
    # Локально: jdbc:postgresql://localhost:5432/devcrew
    # В Docker: jdbc:postgresql://postgres:5432/devcrew (задаётся через env SPRING_DATASOURCE_URL)
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/devcrew}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:devcrew}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:devcrew}}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [taskId=%X{taskId}] [agentRole=%X{agentRole}] - %msg%n"
  level:
    org.springframework.web.client: WARN

devcrew:
  auth:
    jwt:
      secret: ${DEVCREW_AUTH_JWT_SECRET}
      access-token-ttl-seconds: ${DEVCREW_AUTH_JWT_ACCESS_TTL:3600}
      refresh-token-ttl-seconds: ${DEVCREW_AUTH_JWT_REFRESH_TTL:604800}
  claude-code:
    executable: ${DEVCREW_CLAUDE_CODE_EXECUTABLE:claude}
    max-turns: 20
    sandbox-root: /projects
  sandbox:
    root: /projects
  agent:
    max-iterations: 20
    pipeline:
      build-successful-marker: "BUILD SUCCESSFUL"
      request-changes-marker: "REQUEST_CHANGES"
    command-timeout-seconds: 300
    rate-limit:
      retry-delay: 60s
      retry-check-delay: 30000
  billing:
    cost-per-input-token: 0.000003
    cost-per-output-token: 0.000015
    chars-per-token: 4
    free-plan-task-limit: 50
  notification:
    telegram:
      enabled: ${DEVCREW_NOTIFICATION_TELEGRAM_ENABLED:false}
      bot-token: ${DEVCREW_NOTIFICATION_TELEGRAM_BOT_TOKEN:${TELEGRAM_BOT_TOKEN:}}
      chat-id: ${DEVCREW_NOTIFICATION_TELEGRAM_CHAT_ID:${TELEGRAM_CHAT_ID:}}
      max-message-length: 4096
      bot-enabled: ${DEVCREW_NOTIFICATION_TELEGRAM_BOT_ENABLED:false}
      allowed-chat-id: ${DEVCREW_NOTIFICATION_TELEGRAM_ALLOWED_CHAT_ID:0}
      poll-delay-ms: 1000
